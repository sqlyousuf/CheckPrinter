<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Printer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Check Printer</h1>
        <form id="checkForm">
            <label for="bankName">Bank Name:</label>
            <input type="text" id="bankName" placeholder="Enter bank name" required><br><br>

            <label for="bankAddress">Bank Address:</label>
            <input type="text" id="bankAddress" placeholder="Enter bank address" required><br><br>

            <label for="payorName">Your Name/Company:</label>
            <input type="text" id="payorName" placeholder="Enter your name or company name" required><br><br>

            <label for="payorAddress">Your Address:</label>
            <input type="text" id="payorAddress" placeholder="Enter your address" required><br><br>

            <label for="date">Date:</label>
            <input type="date" id="date" required><br><br>

            <label for="payee">Payee:</label>
            <input type="text" id="payee" placeholder="Enter payee name" required><br><br>

            <label for="amount">Amount:</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00" required><br><br>

            <label for="amountWords">Amount in Words:</label>
            <input type="text" id="amountWords" placeholder="Enter amount in words" required><br><br>

            <label for="memo">Memo:</label>
            <input type="text" id="memo" placeholder="Enter memo"><br><br>

            <button type="button" id="printBtn">Print Check</button>
        </form>

        <div id="checkPreview" class="check" style="display: none;">
            <div class="bank-info">
                <div id="previewBankName"></div>
                <div id="previewBankAddress"></div>
            </div>
            <div class="payor-info">
                <div id="previewPayorName"></div>
                <div id="previewPayorAddress"></div>
            </div>
            <div class="check-number">Check No: <span id="previewCheckNumber"></span></div>
            <div class="date">Date: <span id="previewDate"></span></div>
            <div class="payee">Pay to the Order of: <span id="previewPayee"></span></div>
            <div class="amount-line">
                $<span id="previewAmount"></span>
            </div>
            <div class="amount-words">
                <span id="previewAmountWords"></span>
            </div>
            <div class="memo">
                Memo: <span id="previewMemo"></span>
            </div>
            <div class="signature">
                Signature: ___________________________
            </div>
            <div class="micr">
                <input type="text" id="routing" placeholder="Routing Number" required>
                <input type="text" id="account" placeholder="Account Number" required>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
